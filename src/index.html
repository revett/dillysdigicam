<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dilly's Digicam</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-neutral-950 text-neutral-300 min-h-screen px-6 py-12">
  <div class="max-w-4xl mx-auto">
    <header class="text-center mb-12">
      <h1 class="text-3xl font-bold text-white mb-2">Dilly's Digicam</h1>
      <p class="text-neutral-500">Drop your photos, pick your favourites, and give them that 2000s digicam look.</p>
    </header>

    <main>
      <div id="dropzone" class="relative border-2 border-dashed border-neutral-700 rounded-xl py-16 px-8 text-center cursor-pointer transition-colors hover:border-neutral-500 hover:bg-neutral-900">
        <div class="pointer-events-none">
          <span class="text-5xl block mb-4">📷</span>
          <p class="text-neutral-600">Drop photos here or click to upload</p>
        </div>
        <input type="file" id="file-input" accept="image/*,.heic,.heif" multiple class="absolute inset-0 opacity-0 cursor-pointer">
      </div>

      <div id="toolbar" class="hidden items-center gap-4 mt-6">
        <button id="toggle-all" class="bg-neutral-800 text-neutral-300 text-sm px-4 py-2 rounded-lg hover:bg-neutral-700 transition-colors cursor-pointer"></button>
        <span id="selection-count" class="text-neutral-500 text-sm flex-1"></span>
        <button id="edit-photos" class="bg-white text-neutral-950 text-sm font-semibold px-4 py-2 rounded-lg hover:bg-neutral-200 disabled:opacity-30 disabled:cursor-not-allowed transition-colors cursor-pointer">Edit photos</button>
      </div>

      <div id="gallery" class="grid grid-cols-[repeat(auto-fill,minmax(200px,1fr))] gap-4 mt-6"></div>

      <div id="processing" class="hidden mt-16 text-center">
        <div class="flex flex-col items-center gap-6">
          <p id="processing-summary" class="text-neutral-500"></p>
          <div class="w-8 h-8 border-3 border-neutral-700 border-t-white rounded-full animate-spin"></div>
          <p class="text-neutral-600 text-sm">Processing...</p>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
