<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dilly's Digicam</title>
  <meta name="description" content="Drop your photos, pick your favs, and Dilly will help give them that 00s digicam aesthetic. Runs entirely in your browser.">
  <meta property="og:title" content="Dilly's Digicam">
  <meta property="og:description" content="Drop your photos, pick your favs, and Dilly will help give them that 00s digicam aesthetic.">
  <meta property="og:image" content="./dilly.jpg">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Dilly's Digicam">
  <meta name="twitter:description" content="Drop your photos, pick your favs, and Dilly will help give them that 00s digicam aesthetic.">
  <meta name="twitter:image" content="./dilly.jpg">
  <link rel="icon" href="./dilly.jpg">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-neutral-950 text-neutral-300 min-h-screen px-6 flex flex-col">
  <div class="max-w-4xl w-full mx-auto flex-1 flex flex-col justify-center py-12" x-data="app">
    <header class="text-center mb-12">
      <img src="./dilly.jpg" alt="Dilly" class="w-16 h-16 rounded-full object-cover mx-auto mb-4 border-4 border-white">
      <h1 class="text-3xl font-bold text-white mb-2">Dilly's Digicam</h1>
      <p class="text-neutral-500">Drop your photos, pick your favs, and <strong class="text-neutral-300">Dilly</strong> will help give them that 00s digicam aesthetic.</p>
    </header>

    <main>
      <!-- Upload -->
      <div
        x-show="view === 'upload'"
        x-on:dragover.prevent="dragging = true"
        x-on:dragleave.prevent="dragging = false"
        x-on:drop.prevent="onDrop($event)"
        :class="dragging && 'border-neutral-500 bg-neutral-900'"
        class="relative border-2 border-dashed border-neutral-700 rounded-xl py-16 px-8 text-center cursor-pointer transition-colors hover:border-neutral-500 hover:bg-neutral-900"
      >
        <div class="pointer-events-none flex flex-col items-center gap-3">
          <svg class="w-8 h-8 text-neutral-600" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M7.5 7.5l4.5 4.5m0 0 4.5-4.5M12 12V3"/></svg>
          <p class="text-neutral-600">Drop photos here or click to upload</p>
        </div>
        <input type="file" accept="image/*,.heic,.heif" multiple x-on:change="onFileInput($event)" class="absolute inset-0 opacity-0 cursor-pointer">
      </div>

      <!-- Gallery -->
      <template x-if="view === 'gallery'">
        <div>
          <div class="flex items-center gap-4 mt-6">
            <button type="button" x-on:click="toggleAll" class="bg-neutral-800 text-neutral-300 text-sm px-4 py-2 rounded-lg hover:bg-neutral-700 transition-colors cursor-pointer" x-text="allSelected ? 'Deselect all' : 'Select all'"></button>
            <span class="text-neutral-500 text-sm flex-1" x-text="`${selectedCount} of ${photos.length} selected`"></span>
            <button type="button" x-on:click="reset" class="bg-neutral-800 text-neutral-300 text-sm px-4 py-2 rounded-lg hover:bg-neutral-700 transition-colors cursor-pointer">Cancel</button>
            <button type="button" x-on:click="editPhotos" :disabled="selectedCount === 0 || anyLoading" class="bg-white text-neutral-950 text-sm font-semibold px-4 py-2 rounded-lg hover:bg-neutral-200 disabled:opacity-30 disabled:cursor-not-allowed transition-colors cursor-pointer">Edit photos</button>
          </div>

          <div class="grid grid-cols-[repeat(auto-fill,minmax(200px,1fr))] gap-4 mt-6">
            <template x-for="(photo, index) in photos" :key="index">
              <div
                x-on:click="!photo.loading && togglePhoto(index)"
                class="relative aspect-square rounded-lg overflow-hidden"
                :class="photo.loading ? 'bg-neutral-900' : 'cursor-pointer'"
              >
                <template x-if="photo.loading">
                  <div class="w-full h-full flex items-center justify-center">
                    <div class="w-6 h-6 border-2 border-neutral-700 border-t-white rounded-full animate-spin"></div>
                  </div>
                </template>
                <template x-if="!photo.loading">
                  <div class="w-full h-full">
                    <img :src="photo.url" alt="" :alt="photo.file?.name" class="w-full h-full object-cover block transition-opacity" :class="!photo.selected && 'opacity-35'">
                    <div
                      class="absolute top-2 right-2 w-7 h-7 rounded-full border-2 flex items-center justify-center text-xs transition-all"
                      :class="photo.selected ? 'bg-white border-white text-neutral-950' : 'bg-black/30 border-white/50 text-transparent'"
                    >✓</div>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- Processing -->
      <div x-show="view === 'processing'" class="mt-16 text-center">
        <div class="flex flex-col items-center gap-6">
          <img src="./dilly.jpg" alt="Dilly" class="w-16 h-16 rounded-full object-cover border-4 border-white animate-pulse">
          <p class="text-neutral-500" x-text="`Processing ${processedCount} of ${selectedCount}...`"></p>
          <button type="button" x-on:click="cancelProcessing" class="bg-neutral-800 text-neutral-300 text-sm px-4 py-2 rounded-lg hover:bg-neutral-700 transition-colors cursor-pointer">Cancel</button>
        </div>
      </div>

      <!-- Results -->
      <template x-if="view === 'results'">
        <div x-on:keydown.space.window.prevent="previewIndex === null ? openPreview(0) : closePreview()">
          <div class="flex items-center gap-4 mt-6">
            <span class="text-neutral-500 text-sm flex-1" x-text="`${results.length} photos processed`"></span>
            <button type="button" x-on:click="reset" class="bg-neutral-800 text-neutral-300 text-sm px-4 py-2 rounded-lg hover:bg-neutral-700 transition-colors cursor-pointer">Start over</button>
            <button type="button" x-on:click="downloadAll" class="bg-white text-neutral-950 text-sm font-semibold px-4 py-2 rounded-lg hover:bg-neutral-200 transition-colors cursor-pointer">Download all</button>
          </div>

          <div class="grid grid-cols-[repeat(auto-fill,minmax(200px,1fr))] gap-4 mt-6">
            <template x-for="(result, index) in results" :key="index">
              <div class="relative aspect-square rounded-lg overflow-hidden group cursor-pointer" x-on:click="openPreview(index)">
                <img :src="result.url" alt="" class="w-full h-full object-cover block">
                <button type="button" x-on:click.stop="downloadOne(index)" class="absolute bottom-2 right-2 bg-white/90 text-neutral-950 text-xs font-medium px-3 py-1.5 rounded-md opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">Download</button>
              </div>
            </template>
          </div>

          <p class="text-neutral-600 text-xs text-center mt-4">Press space to preview</p>
        </div>
      </template>

      <!-- Preview modal -->
      <template x-if="previewIndex !== null">
        <div
          class="fixed inset-0 z-40 flex items-center justify-center bg-black/90"
          x-on:keydown.escape.window="closePreview"
          x-on:keydown.left.window="previewPrev"
          x-on:keydown.right.window="previewNext"
          x-transition:enter="transition ease-out duration-200"
          x-transition:enter-start="opacity-0"
          x-transition:enter-end="opacity-100"
          x-transition:leave="transition ease-in duration-150"
          x-transition:leave-start="opacity-100"
          x-transition:leave-end="opacity-0"
        >
          <!-- Close button -->
          <button type="button" x-on:click="closePreview" class="absolute top-4 right-4 text-white/60 hover:text-white transition-colors cursor-pointer z-50">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
          </button>

          <!-- Prev arrow -->
          <button
            type="button"
            x-show="previewIndex > 0"
            x-on:click.stop="previewPrev"
            class="absolute left-4 text-white/60 hover:text-white transition-colors cursor-pointer z-50"
          >
            <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/></svg>
          </button>

          <!-- Image -->
          <img
            :src="results[previewIndex]?.url"
            alt=""
            class="max-h-[85vh] max-w-[90vw] object-contain rounded-lg"
            x-on:click.stop
          >

          <!-- Next arrow -->
          <button
            type="button"
            x-show="previewIndex < results.length - 1"
            x-on:click.stop="previewNext"
            class="absolute right-4 text-white/60 hover:text-white transition-colors cursor-pointer z-50"
          >
            <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
          </button>

          <!-- Counter -->
          <span class="absolute bottom-4 text-white/40 text-sm" x-text="`${previewIndex + 1} / ${results.length}`"></span>
        </div>
      </template>
    </main>

  </div>

  <footer class="py-4 text-center text-neutral-700 text-xs">
    Built by <strong class="text-neutral-600">Dilly</strong> in Bermondsey (April 2026) &middot; <a href="./llms.txt" class="underline hover:text-neutral-500">/llms.txt</a> &middot; <a href="https://github.com/revett/dillysdigicam" class="underline hover:text-neutral-500">GitHub</a>
  </footer>

  <!-- Toasts -->
  <div id="toasts" class="fixed bottom-6 right-6 flex flex-col gap-2 z-50" x-data="toasts">
    <template x-for="(toast, i) in items" :key="toast.id">
      <div
        x-show="toast.visible"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 translate-y-2"
        x-transition:enter-end="opacity-100 translate-y-0"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100 translate-y-0"
        x-transition:leave-end="opacity-0 translate-y-2"
        class="bg-neutral-800 text-neutral-200 text-sm px-4 py-2.5 rounded-lg shadow-lg"
        x-text="toast.message"
      ></div>
    </template>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
